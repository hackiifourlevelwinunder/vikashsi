<!DOCTYPE html>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0088cc, #00c6ff);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }

    .container {
      max-width: 420px;
      width: 100%;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      border-radius: 22px;
      padding: 35px 25px;
      text-align: center;
      box-shadow: 0 20px 45px rgba(0,0,0,0.25);
    }

    .logo {
      width: 90px;
      height: 90px;
      background: #fff;
      color: #0088cc;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 42px;
      font-weight: bold;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: #ffffff;
      color: #0088cc;
      text-decoration: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.04);
      background: #f2f2f2;
    }

      margin-top: 18px;
      font-size: 13px;
      opacity: 0.9;

      onclick="fbq('track', 'Lead');"
