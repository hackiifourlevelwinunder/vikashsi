}

.card{
background:#fff;

}

.profile{

height:90px;

}

.check{

right:0;
background:#1da1f2;
width:22px;
height:22px;

align-items:center;
color:#fff;
font-size:14px;

}

h1{

}

.sub{

}

.desc{

.link-text{
